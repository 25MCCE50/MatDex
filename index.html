    <style>
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
            /* App handles scrolling */
        }

        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Custom scrollbar */
        .custom-scrollbar::-webkit-scrollbar {
            width: 8px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background-color: #cbd5e1;
            border-radius: 20px;
        }

        .dark .custom-scrollbar::-webkit-scrollbar-thumb {
            background-color: #475569;
        }

        /* ── Tile entrance animations ── */
        @keyframes tileIn {
            from {
                opacity: 0;
                transform: translateY(18px) scale(0.96);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .tile-enter {
            animation: tileIn 0.38s cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        /* ── Navbar tab slide-in ── */
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .slide-down {
            animation: slideDown 0.25s ease both;
        }

        /* ── Focus mode pulse ring ── */
        @keyframes focusPulse {

            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(var(--brand-500) / 0.4);
            }

            50% {
                box-shadow: 0 0 0 18px rgba(var(--brand-500) / 0);
            }
        }

        .focus-pulse {
            animation: focusPulse 2s ease-in-out infinite;
        }

        /* ── Logo shimmer ── */

            0% {
                background-position: -200% center;
            }

            100% {
                background-position: 200% center;
            }
        }

        .logo-shimmer {
            background: linear-gradient(90deg, rgb(var(--brand-500)), rgb(var(--brand-300)), rgb(var(--brand-500)));
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: shimmer 3s linear infinite;
        }
    </style>
</head>

<body class="bg-slate-50 text-slate-900 dark:bg-slate-900 dark:text-slate-100 transition-colors duration-300">
    <div id="root"></div>
    <script type="text/babel" data-type="module">
        const { useState, useEffect, useMemo, useRef } = React;
        const { motion, AnimatePresence } = window.Motion;

        // --- Icons ---
        const SearchIcon = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>;
        const MoonIcon = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" /></svg>;
        const SunIcon = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" /></svg>;
        const CopyIcon = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2 2v8a2 2 0 002 2z" /></svg>;
        const CheckIcon = () => <svg className="w-5 h-5 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7" /></svg>;
        const CloseIcon = () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" /></svg>;
        const SettingsIcon = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><circle cx="12" cy="12" r="3" /></svg>;

        // Render markdown bold (**text**) in AI responses
        function renderMarkdown(text) {
            if (!text) return null;
            const parts = text.split(/(\*\*[^*]+\*\*)/g);
            return parts.map((part, i) => {
                if (part.startsWith('**') && part.endsWith('**')) {
                    return <strong key={i} className="font-bold text-slate-900 dark:text-white">{part.slice(2, -2)}</strong>;
                }
                return <span key={i}>{part}</span>;
            });
        }

        // Categories will be derived dynamically from the data (exclude Periodic Table from normal bar)
        const CATEGORIES = ["All", ...new Set((typeof allMatDexData !== 'undefined' ? allMatDexData : [])
            .filter(item => item.category !== 'Periodic Table')
            .map(item => item.category).filter(Boolean))].sort((a, b) => {
                if (a === "All") return -1;
                if (b === "All") return 1;
                return a.localeCompare(b);
            });
        const ALPHABETS = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");

        // ── Periodic Table Component ──────────────────────────────────────────
        const PT_COLORS = {
            'alkali-metal': { bg: 'bg-red-100 dark:bg-red-900/40', text: 'text-red-800 dark:text-red-200', border: 'border-red-300 dark:border-red-700', label: 'Alkali Metal' },
            'alkaline-earth': { bg: 'bg-orange-100 dark:bg-orange-900/40', text: 'text-orange-800 dark:text-orange-200', border: 'border-orange-300 dark:border-orange-700', label: 'Alkaline Earth' },
            'transition': { bg: 'bg-yellow-100 dark:bg-yellow-900/40', text: 'text-yellow-800 dark:text-yellow-200', border: 'border-yellow-300 dark:border-yellow-700', label: 'Transition Metal' },
            'post-transition': { bg: 'bg-green-100 dark:bg-green-900/40', text: 'text-green-800 dark:text-green-200', border: 'border-green-300 dark:border-green-700', label: 'Post-Transition' },
            'metalloid': { bg: 'bg-teal-100 dark:bg-teal-900/40', text: 'text-teal-800 dark:text-teal-200', border: 'border-teal-300 dark:border-teal-700', label: 'Metalloid' },
            'nonmetal': { bg: 'bg-blue-100 dark:bg-blue-900/40', text: 'text-blue-800 dark:text-blue-200', border: 'border-blue-300 dark:border-blue-700', label: 'Nonmetal' },
            'halogen': { bg: 'bg-purple-100 dark:bg-purple-900/40', text: 'text-purple-800 dark:text-purple-200', border: 'border-purple-300 dark:border-purple-700', label: 'Halogen' },
            'noble-gas': { bg: 'bg-pink-100 dark:bg-pink-900/40', text: 'text-pink-800 dark:text-pink-200', border: 'border-pink-300 dark:border-pink-700', label: 'Noble Gas' },
            'lanthanide': { bg: 'bg-indigo-100 dark:bg-indigo-900/40', text: 'text-indigo-800 dark:text-indigo-200', border: 'border-indigo-300 dark:border-indigo-700', label: 'Lanthanide' },
            'actinide': { bg: 'bg-violet-100 dark:bg-violet-900/40', text: 'text-violet-800 dark:text-violet-200', border: 'border-violet-300 dark:border-violet-700', label: 'Actinide' },
            'unknown': { bg: 'bg-slate-100 dark:bg-slate-700', text: 'text-slate-600 dark:text-slate-300', border: 'border-slate-300 dark:border-slate-600', label: 'Unknown' },
        };

        function PeriodicTableView({ data, onSelectElement }) {
            // Build a grid: rows 1-7 (main table) + rows 8-9 (lanthanide/actinide)
            // period × group → element
            const elementsByPG = {};
            const elements = data.filter(d => d.category === 'Periodic Table' && d.period && d.group);
            elements.forEach(el => {
                elementsByPG[`${el.period}-${el.group}`] = el;
            });

            const Cell = ({ period, group }) => {
                const el = elementsByPG[`${period}-${group}`];
                if (!el) {
                    // Lanthanide/Actinide placeholder in main table
                    if ((period === 6 && group === 3 && !elementsByPG['6-3']) ||
                        (period === 7 && group === 3 && !elementsByPG['7-3'])) {
                        return <div className="w-14 h-14 flex items-center justify-center text-[9px] text-slate-400 italic">57-71</div>;
                    }
                    return <div className="w-14 h-14" />;
                }
                const colors = PT_COLORS[el.element_type] || PT_COLORS['unknown'];
                return (
                    <motion.button
                        onClick={() => onSelectElement(el)}
                        whileHover={{ scale: 1.15, zIndex: 10 }}
                        whileTap={{ scale: 0.95 }}
                        className={`w-14 h-14 rounded-md border ${colors.bg} ${colors.border} ${colors.text} flex flex-col items-center justify-center cursor-pointer transition-shadow hover:shadow-lg relative`}
                        title={el.term}
                    >
                        <span className="text-[8px] font-semibold opacity-70 leading-none">{el.atomic_number}</span>
                        <span className="text-[13px] font-bold leading-none">{el.symbol}</span>
                    </motion.button>
                );
            };

            const rows = [];
            // Main table rows 1-7
            for (let p = 1; p <= 7; p++) {
                const cells = [];
                for (let g = 1; g <= 18; g++) {
                    // Skip lanthanide/actinide placeholder columns (period 6&7, group 3 occupied by Lu/Lr)
                    cells.push(<Cell key={g} period={p} group={g} />);
                }
                rows.push(
                    <div key={p} className="flex gap-0.5 items-center">
                        <span className="w-4 text-[9px] text-slate-400 dark:text-slate-500 text-right mr-1 flex-none">{p}</span>
                        {cells}
                    </div>
                );
            }
            // Lanthanide row (period 8): start g=1 so Uue(g1) and Ubn(g2) are visible
            const lantRow = [];
            for (let g = 1; g <= 17; g++) lantRow.push(<Cell key={g} period={8} group={g} />);
            // Actinide row (period 9): start g=1 for alignment (g1-2 will be empty cells)
            const actRow = [];
            for (let g = 1; g <= 17; g++) actRow.push(<Cell key={g} period={9} group={g} />);

            return (
                <div className="overflow-auto custom-scrollbar pb-8">
                    {/* Group numbers */}
                    <div className="flex gap-0.5 mb-1 pl-5">
                        {[1, ...Array.from({ length: 17 }, (_, i) => i + 2)].map(g => (
                            <span key={g} className="w-14 text-[9px] text-slate-400 dark:text-slate-500 text-center flex-none">{g}</span>
                        ))}
                    </div>
                    <div className="flex flex-col gap-0.5">{rows}</div>
                    {/* Lanthanide / Actinide rows */}
                    <div className="mt-3 flex flex-col gap-0.5">
                        <div className="flex gap-0.5 items-center">
                            <span className="text-[8px] text-indigo-500 font-bold mr-1 w-4 text-right flex-none">Ln</span>
                            {lantRow}
                        </div>
                        <div className="flex gap-0.5 items-center">
                            <span className="text-[8px] text-violet-500 font-bold mr-1 w-4 text-right flex-none">Ac</span>
                            {actRow}
                        </div>
                    </div>
                    {/* Legend */}
                    <div className="mt-4 flex flex-wrap gap-2 pl-6">
                        {Object.entries(PT_COLORS).filter(([k]) => k !== 'unknown').map(([k, v]) => (
                            <div key={k} className={`flex items-center gap-1 px-2 py-0.5 rounded-full border text-[10px] font-medium ${v.bg} ${v.text} ${v.border}`}>
                                <span>{v.label}</span>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }


        // ── Wikipedia helpers ──────────────────────────────────────────────────

        // Resolve the true Wikipedia article title for a search term.
        // Strategy: opensearch → if title ≠ search term try a direct "page info"
        // to follow redirects → if still nothing, try the second suggestion.
        async function resolveWikiTitle(rawTerm) {
            const clean = rawTerm.split(' (')[0].split(' - ')[0].trim();

            // 1) Opensearch: get up to 5 suggestions
            const osUrl = `https://en.wikipedia.org/w/api.php?action=opensearch&search=${encodeURIComponent(clean)}&limit=5&format=json&origin=*`;
            const osData = await fetch(osUrl).then(r => r.json());
            const suggestions = osData[1] || [];
            const urls = osData[3] || [];
            if (suggestions.length === 0) return null;

            // Helper: verify a title resolves to a real, non-disambiguation page
            // and return its canonical (redirected) title + URL
            async function verifyTitle(title, fallbackUrl) {
                try {
                    const infoUrl = `https://en.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(title)}&redirects=1&prop=info|pageprops&inprop=url&format=json&origin=*`;
                    const info = await fetch(infoUrl).then(r => r.json());
                    const pages = Object.values(info.query.pages);
                    const page = pages[0];
                    if (!page || page.missing !== undefined) return null;
                    // Skip disambiguation pages
                    if (page.pageprops && page.pageprops.disambiguation !== undefined) return null;
                    // Use the canonical full URL if provided, else build it
                    const canonUrl = page.fullurl || fallbackUrl || `https://en.wikipedia.org/wiki/${encodeURIComponent(page.title.replace(/ /g, '_'))}`;
                    return { title: page.title, url: canonUrl };
                } catch { return null; }
            }

            // Try first suggestion
            let resolved = await verifyTitle(suggestions[0], urls[0]);
            if (!resolved && suggestions.length > 1) {
                // Try remaining suggestions
                for (let i = 1; i < suggestions.length; i++) {
                    resolved = await verifyTitle(suggestions[i], urls[i]);
                    if (resolved) break;
                }
            }
            return resolved; // { title, url } or null
        }

        // Fetch the best diagram image from a resolved Wikipedia title.
        // Priority: first non-human PNG/SVG candidate (not meta-icon).
        async function fetchWikiImage(title) {
            const HUMAN_KEYWORDS = [
                'person', 'people', 'portrait', 'biography', 'politician', 'scientist',
                'author', 'actor', 'actress', 'musician', 'athlete', 'born ', 'died ',
                'american', 'british', 'french', 'german', 'professor', 'doctor', 'philosopher'
            ];
            const IGNORE_FILES = ['ambox', 'wikidata', 'commons-logo', 'folder', 'icon', 'stub', 'flag', 'edit-clear'];

            try {
                const mediaUrl = `https://en.wikipedia.org/api/rest_v1/page/media-list/${encodeURIComponent(title)}`;
                const md = await fetch(mediaUrl).then(r => r.json());
                if (!md || !md.items) return null;

                // Collect usable candidates (image type, not meta-icons, not people)
                const candidates = [];
                for (const item of md.items) {
                    if (item.type !== 'image') continue;
                    const lowerTitle = (item.title || '').toLowerCase();
                    const isMeta = IGNORE_FILES.some(kw => lowerTitle.includes(kw));
                    if (isMeta) continue;
                    const captionText = (item.caption && item.caption.text ? item.caption.text : '').toLowerCase();
                    const descText = (item.caption && item.caption.html ? item.caption.html : '').toLowerCase();
                    const likelyHuman = HUMAN_KEYWORDS.some(kw => captionText.includes(kw) || descText.includes(kw));
                    if (!likelyHuman) candidates.push({ item, lowerTitle });
                }

                if (candidates.length === 0) return null;

                // Pick the first candidate (could be SVG or raster)
                const pick = candidates[0];
                const fileTitle = pick.item.title;

                // If it's an SVG, fetch its direct Wikimedia URL
                if (pick.lowerTitle.endsWith('.svg')) {
                    try {
                        const commonsApi = `https://en.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(fileTitle)}&prop=imageinfo&iiprop=url&format=json&origin=*`;
                        const ci = await fetch(commonsApi).then(r => r.json());
                        const pages = Object.values(ci.query.pages);
                        const svgUrl = pages[0]?.imageinfo?.[0]?.url;
                        if (svgUrl) return svgUrl;
                    } catch { /* fall through */ }
                }

                // For raster (PNG/JPG/etc), use srcset highest resolution or thumbnail
                const srcset = pick.item.srcset || [];
                if (srcset.length > 0) return srcset[srcset.length - 1].src;
                return pick.item.thumbnail?.source || null;
            } catch { return null; }
        }

        function WikipediaImage({ term, onUrlFound }) {
            const [imgSrc, setImgSrc] = React.useState(null);

            React.useEffect(() => {
                let cancelled = false;
                setImgSrc(null);

                (async () => {
                    // Step 1: resolve a valid Wikipedia page
                    const resolved = await resolveWikiTitle(term);
                    if (cancelled) return;

                    if (!resolved) {
                        if (onUrlFound) onUrlFound(null);
                        return;
                    }
                    // Step 2: report the valid URL to the parent
                    if (onUrlFound) onUrlFound(resolved.url);

                    // Step 3: fetch the best diagram image
                    const src = await fetchWikiImage(resolved.title);
                    if (!cancelled && src) setImgSrc(src);
                })();

                return () => { cancelled = true; };
            }, [term]);

            if (!imgSrc) return null;
            return (
                <div className="relative mt-6 rounded-xl overflow-hidden border border-slate-200 dark:border-slate-700 shadow-md flex items-center justify-center bg-slate-100 dark:bg-slate-900" style={{ maxHeight: '320px' }}>
                    <img src={imgSrc} alt={term} className="h-full max-h-72 w-auto object-contain" style={{ display: 'block', margin: '0 auto' }} />
                    <div className="absolute bottom-0 right-0 text-[10px] text-slate-400 dark:text-slate-500 px-2 py-0.5 bg-white/70 dark:bg-slate-900/70 rounded-tl">Diagram via Wikipedia</div>
                </div>
            );
        }

        // Fuzzy search: Levenshtein distance
        function levenshtein(a, b) {
            const m = a.length, n = b.length;
            const dp = Array.from({ length: m + 1 }, (_, i) => Array.from({ length: n + 1 }, (_, j) => i === 0 ? j : j === 0 ? i : 0));
            for (let i = 1; i <= m; i++) for (let j = 1; j <= n; j++)
                dp[i][j] = a[i - 1] === b[j - 1] ? dp[i - 1][j - 1] : 1 + Math.min(dp[i - 1][j], dp[i][j - 1], dp[i - 1][j - 1]);
            return dp[m][n];
        }
        function fuzzyMatch(term, query) {
            const t = term.toLowerCase(), q = query.toLowerCase();
            if (t.includes(q)) return true;
            if (q.length >= 5) {
                const words = t.split(/\s+/);
                return words.some(w => levenshtein(w, q) <= Math.floor(q.length / 4));
            }
            return false;
        }

        // Helper: hex to "R G B" string for CSS custom properties
        function hexToRgb(hex) {
            const r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
            return `${r} ${g} ${b}`;
        }
        function lighten(hex, amt) { // amt 0-1 mixes with white
            const r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
            return `${Math.round(r + (255 - r) * amt)} ${Math.round(g + (255 - g) * amt)} ${Math.round(b + (255 - b) * amt)}`;
        }
        function darken(hex, amt) { // amt 0-1 mixes with black
            const r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
            return `${Math.round(r * (1 - amt))} ${Math.round(g * (1 - amt))} ${Math.round(b * (1 - amt))}`;
        }
        function makePalette(hex) {
            return {
                50: lighten(hex, 0.92), 100: lighten(hex, 0.82), 300: lighten(hex, 0.45),
                400: lighten(hex, 0.22), 500: hexToRgb(hex), 600: darken(hex, 0.12),
                700: darken(hex, 0.28), 800: darken(hex, 0.44), 900: darken(hex, 0.58)
            };
        }

        const THEMES = {
            'light-sky': { name: 'Sky Blue (Light)', bg: '#f0faff', accent: '#70d6ff', c1: '#f0faff', c2: '#70d6ff', dark: false, palette: makePalette('#70d6ff') },
            'dark-sky': { name: 'Sky Blue (Dark)', bg: '#071620', accent: '#70d6ff', c1: '#071620', c2: '#70d6ff', dark: true, palette: makePalette('#70d6ff') },
            'light-pink': { name: 'Bubblegum (Light)', bg: '#fff0f7', accent: '#ff70a6', c1: '#fff0f7', c2: '#ff70a6', dark: false, palette: makePalette('#ff70a6') },
            'dark-pink': { name: 'Bubblegum (Dark)', bg: '#200710', accent: '#ff70a6', c1: '#200710', c2: '#ff70a6', dark: true, palette: makePalette('#ff70a6') },
            'light-peach': { name: 'Peach (Light)', bg: '#fff5f0', accent: '#ff9770', c1: '#fff5f0', c2: '#ff9770', dark: false, palette: makePalette('#ff9770') },
            'dark-peach': { name: 'Peach (Dark)', bg: '#1f0a04', accent: '#ff9770', c1: '#1f0a04', c2: '#ff9770', dark: true, palette: makePalette('#ff9770') },
            'light-yellow': { name: 'Lemon (Light)', bg: '#fffdf0', accent: '#ffd670', c1: '#fffdf0', c2: '#ffd670', dark: false, palette: makePalette('#ffd670') },
            'dark-yellow': { name: 'Lemon (Dark)', bg: '#1a1500', accent: '#ffd670', c1: '#1a1500', c2: '#ffd670', dark: true, palette: makePalette('#ffd670') },
            'light-lime': { name: 'Lime (Light)', bg: '#f8fff0', accent: '#e9ff70', c1: '#f8fff0', c2: '#e9ff70', dark: false, palette: makePalette('#e9ff70') },
            'dark-lime': { name: 'Lime (Dark)', bg: '#101a00', accent: '#e9ff70', c1: '#101a00', c2: '#e9ff70', dark: true, palette: makePalette('#e9ff70') },
        };

        function App() {
            const [searchInput, setSearchInput] = useState('');      // raw typed text
            const [activeSearch, setActiveSearch] = useState('');    // committed search (drives grid)
            const [suggestions, setSuggestions] = useState([]);
            const [showSuggestions, setShowSuggestions] = useState(false);
            const searchRef = useRef(null);
            const suggestionsRef = useRef(null);

            const [selectedCategory, setSelectedCategory] = useState('All');
            const [selectedAlphabet, setSelectedAlphabet] = useState(null);

            const [wikiUrl, setWikiUrl] = useState(undefined); // undefined = loading, null = not found, string = found
            const [selectedTerm, setSelectedTerm] = useState(null);
            const [selectedSubGroup, setSelectedSubGroup] = useState(null);
            const [copied, setCopied] = useState(false);

            const [isChatOpen, setIsChatOpen] = useState(false);
            const [chatMessages, setChatMessages] = useState(() => {
                try { return JSON.parse(localStorage.getItem('matdex-chat-history') || '[]'); } catch { return []; }
            });
            const [chatInput, setChatInput] = useState('');
            const [isChatLoading, setIsChatLoading] = useState(false);
            const chatEndRef = useRef(null);
            const chatAbortRef = useRef(null);
            const [bookmarks, setBookmarks] = useState(() => {
                try { return JSON.parse(localStorage.getItem('matdex-bookmarks') || '[]'); } catch { return []; }
            });
            const [activeTab, setActiveTab] = useState('dictionary');

            // Settings
            const [isSettingsOpen, setIsSettingsOpen] = useState(false);
            const [fontSize, setFontSize] = useState(() => localStorage.getItem('matdex-fontsize') || 'medium');
            const [theme, setTheme] = useState(() => { const saved = localStorage.getItem('matdex-theme'); return (saved && THEMES[saved]) ? saved : 'dark-sky'; });
            const [animationKey, setAnimationKey] = useState(0);

            // Focus Mode
            const [isFocusOpen, setIsFocusOpen] = useState(false);
            const [focusMinutes, setFocusMinutes] = useState(25);
            const [focusSecondsLeft, setFocusSecondsLeft] = useState(25 * 60);
            const [focusRunning, setFocusRunning] = useState(false);
            const [focusActive, setFocusActive] = useState(false); // true while session is live (timer started at least once)
            const [focusQuote, setFocusQuote] = useState(0);
            const focusIntervalRef = useRef(null);
            const FOCUS_QUOTES = [
                { q: "The secret of getting ahead is getting started.", a: "Mark Twain" },
                { q: "Concentrate all your thoughts upon the work in hand.", a: "Alexander Graham Bell" },
                { q: "It always seems impossible until it's done.", a: "Nelson Mandela" },
                { q: "Quality is not an act, it is a habit.", a: "Aristotle" },
                { q: "Do what you can, with what you have, where you are.", a: "Theodore Roosevelt" },
                { q: "The expert in anything was once a beginner.", a: "Helen Hayes" },
                { q: "Success is the sum of small efforts repeated day in and day out.", a: "Robert Collier" },
                { q: "The more that you read, the more things you will know.", a: "Dr. Seuss" },
            ];
            const focusStart = () => {
                if (focusIntervalRef.current) return;
                setFocusRunning(true);
                setFocusActive(true);
                focusIntervalRef.current = setInterval(() => {
                    setFocusSecondsLeft(s => {
                        if (s <= 1) { clearInterval(focusIntervalRef.current); focusIntervalRef.current = null; setFocusRunning(false); return 0; }
                        return s - 1;
                    });
                }, 1000);
            };
            const focusPause = () => {
                clearInterval(focusIntervalRef.current); focusIntervalRef.current = null; setFocusRunning(false);
            };
            const focusStop = () => {
                clearInterval(focusIntervalRef.current); focusIntervalRef.current = null;
                setFocusRunning(false); setFocusActive(false); setFocusSecondsLeft(focusMinutes * 60);
            };
            const focusAddFive = () => {
                setFocusSecondsLeft(s => s + 300);
                setFocusMinutes(m => m + 5);
            };
            // Break: pause for 60s then auto-resume
            const focusBreak = () => {
                focusPause();
                setIsFocusOpen(false);
                setTimeout(() => {
                    focusStart();
                }, 60000);
            };
            useEffect(() => {
                if (isFocusOpen) {
                    setFocusQuote(Math.floor(Math.random() * FOCUS_QUOTES.length));
                    if (!focusActive) {
                        setFocusSecondsLeft(focusMinutes * 60);
                        setFocusRunning(false);
                        if (focusIntervalRef.current) { clearInterval(focusIntervalRef.current); focusIntervalRef.current = null; }
                    }
                }
            }, [isFocusOpen]);
            const focusMM = String(Math.floor(focusSecondsLeft / 60)).padStart(2, '0');
            const focusSS = String(focusSecondsLeft % 60).padStart(2, '0');

            // Parse formula symbol descriptions from inline parenthetical notation
            // e.g. "ε = ΔL / L₀" → no desc; "σ = F / A (σ = stress, F = force, A = area)" → table
            function parseFormulaSymbols(formula) {
                if (!formula) return [];
                // Look for a description block in parentheses, e.g. (where X = ..., Y = ...)
                const match = formula.match(/\(([^)]+)\)/);
                if (!match) return [];
                const inner = match[1];
                // Split on commas and semicolons
                const parts = inner.split(/[,;]+/).map(s => s.trim()).filter(Boolean);
                const symbols = [];
                for (const part of parts) {
                    // Match patterns like "X = description" or "X is description"
                    const eq = part.match(/^([^=]+)=(.+)$/);
                    const is = part.match(/^([^=]+?)\s+is\s+(.+)$/i);
                    if (eq) symbols.push({ sym: eq[1].trim(), desc: eq[2].trim() });
                    else if (is) symbols.push({ sym: is[1].trim(), desc: is[2].trim() });
                    else if (part.length < 80) symbols.push({ sym: '', desc: part }); // plain note
                }
                return symbols.filter(s => s.sym || s.desc);
            }


            useEffect(() => {
                if (chatEndRef.current) {
                    chatEndRef.current.scrollIntoView({ behavior: 'smooth' });
                }
            }, [chatMessages]);

            // Persist chat history to localStorage (skip streaming/in-progress messages)
            useEffect(() => {
                const toSave = chatMessages.filter(m => !m.streaming);
                try { localStorage.setItem('matdex-chat-history', JSON.stringify(toSave)); } catch { /* storage quota */ }
            }, [chatMessages]);

            const toggleBookmark = (item) => {
                setBookmarks(prev => {
                    const exists = prev.some(b => b.term === item.term);
                    const next = exists ? prev.filter(b => b.term !== item.term) : [...prev, item];
                    localStorage.setItem('matdex-bookmarks', JSON.stringify(next));
                    return next;
                });
            };

            const clearAllBookmarks = () => {
                setBookmarks([]);
                localStorage.removeItem('matdex-bookmarks');
            };

            const clearChat = () => {
                setChatMessages([]);
                localStorage.removeItem('matdex-chat-history');
            };

            const handleStopChat = () => {
                if (chatAbortRef.current) chatAbortRef.current.abort();
                setChatMessages(prev => {
                    const updated = [...prev];
                    const last = updated[updated.length - 1];
                    if (last && last.streaming) {
                        updated[updated.length - 1] = { ...last, content: last.content, streaming: false, stopped: true };
                    }
                    return updated;
                });
                setIsChatLoading(false);
            };

            const handleSendChatMessage = async (msg = null) => {
                const messageToSend = typeof msg === 'string' ? msg : chatInput;
                if (!messageToSend.trim() || isChatLoading) return;

                const history = chatMessages.filter(m => !m.error && !m.stopped);
                setChatMessages(prev => [...prev, { role: 'user', content: messageToSend }]);
                setChatInput('');
                setIsChatLoading(true);

                // Placeholder for streaming
                setChatMessages(prev => [...prev, { role: 'assistant', content: '', streaming: true }]);

                const controller = new AbortController();
                chatAbortRef.current = controller;

                try {
                    const response = await fetch('/api/chat', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ message: messageToSend, history }),
                        signal: controller.signal
                    });

                    if (!response.ok) {
                        throw new Error(`Server error: ${response.status}`);
                    }

                    const reader = response.body.getReader();
                    const decoder = new TextDecoder();
                    let buffer = '';

                    while (true) {
                        const { value, done } = await reader.read();
                        if (done) break;
                        buffer += decoder.decode(value, { stream: true });
                        const lines = buffer.split('\n');
                        buffer = lines.pop();
                        for (const line of lines) {
                            if (line.startsWith('data: ') && line !== 'data: [DONE]') {
                                try {
                                    const parsed = JSON.parse(line.substring(6));
                                    if (parsed.content) {
                                        setChatMessages(prev => {
                                            const updated = [...prev];
                                            const last = updated[updated.length - 1];
                                            if (last && last.streaming) {
                                                updated[updated.length - 1] = { ...last, content: last.content + parsed.content };
                                            }
                                            return updated;
                                        });
                                    }
                                    if (parsed.error) {
                                        setChatMessages(prev => {
                                            const updated = [...prev];
                                            updated[updated.length - 1] = { role: 'assistant', content: `Error: ${parsed.error}`, error: true };
                                            return updated;
                                        });
                                    }
                                } catch (e) { /* skip partial */ }
                            }
                        }
                    }
                    // Mark streaming done
                    setChatMessages(prev => {
                        const updated = [...prev];
                        const last = updated[updated.length - 1];
                        if (last && last.streaming) updated[updated.length - 1] = { ...last, streaming: false };
                        return updated;
                    });
                } catch (error) {
                    if (error.name === 'AbortError') return; // already handled by handleStopChat
                    setChatMessages(prev => {
                        const updated = [...prev];
                        updated[updated.length - 1] = { role: 'assistant', content: `Error: ${error.message}`, error: true };
                        return updated;
                    });
                } finally {
                    chatAbortRef.current = null;
                    setIsChatLoading(false);
                }
            };

            const openDetailedChat = (term) => {
                setSelectedTerm(null);
                setIsChatOpen(true);
                setTimeout(() => handleSendChatMessage(`Give a detailed definition of ${term}`), 200);
            };

            const prevTermRef = useRef(null);
            if (selectedTerm) {
                prevTermRef.current = selectedTerm;
            }
            const displayTerm = selectedTerm || prevTermRef.current;

            // Wikipedia image fetch helper
            const getWikipediaImageUrl = (term) =>
                `https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(term.split(' (')[0].split(' - ')[0])}`;

            useEffect(() => {
                if (selectedTerm && selectedTerm.groupDetails && selectedTerm.groupDetails.length > 0) {
                    setSelectedSubGroup(selectedTerm.groupDetails[0].group);
                } else {
                    setSelectedSubGroup(null);
                }
            }, [selectedTerm]);

            // Add categories to data and sort
            const data = useMemo(() => {
                return (typeof allMatDexData !== 'undefined' ? allMatDexData : []).sort((a, b) => a.term.localeCompare(b.term));
            }, []);

            // Autocomplete: update suggestions as user types
            useEffect(() => {
                if (searchInput.trim().length < 2) { setSuggestions([]); return; }
                const q = searchInput.toLowerCase();
                const matches = data
                    .filter(item => fuzzyMatch(item.term, q))
                    .sort((a, b) => {
                        const aExact = a.term.toLowerCase().startsWith(q) ? 0 : 1;
                        const bExact = b.term.toLowerCase().startsWith(q) ? 0 : 1;
                        return aExact - bExact || a.term.localeCompare(b.term);
                    })
                    .slice(0, 5);
                setSuggestions(matches);
            }, [searchInput, data]);

            // Click outside to close suggestions
            useEffect(() => {
                const handler = (e) => {
                    if (searchRef.current && !searchRef.current.contains(e.target)) {
                        setShowSuggestions(false);
                    }
                };
                document.addEventListener('mousedown', handler);
                return () => document.removeEventListener('mousedown', handler);
            }, []);

            // Filter data by committed search, category, alphabet
            // When searching, only show terms whose NAME matches (not definition)
            const filteredData = useMemo(() => {
                return data.filter(item => {
                    const matchSearch = activeSearch ? fuzzyMatch(item.term, activeSearch) : true;
                    const matchCat = selectedCategory === 'All' ? true : item.category === selectedCategory;
                    const matchAlpha = selectedAlphabet ? item.term.toUpperCase().startsWith(selectedAlphabet) : true;
                    return matchSearch && matchCat && matchAlpha;
                });
            }, [data, activeSearch, selectedCategory, selectedAlphabet]);

            // Bump animationKey whenever filter results change → re-triggers tile animations
            useEffect(() => { setAnimationKey(k => k + 1); }, [filteredData]);

            // Theme + font size effect
            useEffect(() => {
                const t = THEMES[theme] || THEMES['white-blue'];
                if (t.dark) {
                    document.documentElement.classList.add('dark');
                } else {
                    document.documentElement.classList.remove('dark');
                }
                document.documentElement.style.setProperty('--theme-bg', t.bg);
                document.documentElement.style.setProperty('--theme-accent', t.accent);
                if (t.palette) {
                    Object.entries(t.palette).forEach(([shade, rgb]) => {
                        document.documentElement.style.setProperty(`--brand-${shade}`, rgb);
                    });
                }
                localStorage.setItem('matdex-theme', theme);

                const sizes = { small: '13px', medium: '15px', large: '17px' };
                document.documentElement.style.fontSize = sizes[fontSize] || '15px';
                localStorage.setItem('matdex-fontsize', fontSize);
            }, [theme, fontSize]);

            const handleCopy = (text) => {
                navigator.clipboard.writeText(text).then(() => {
                    setCopied(true);
                    setTimeout(() => setCopied(false), 2000);
                });
            };

            const toggleAlphabet = (letter) => {
                setSelectedAlphabet(prev => prev === letter ? null : letter);
            };

            // Prevent scrolling on body when modal is open
            useEffect(() => {
                if (selectedTerm) {
                    document.body.style.overflow = 'hidden';
                    setWikiUrl(undefined); // Reset wiki URL state when opening a new term
                } else {
                    document.body.style.overflow = 'hidden'; // Keep body hidden, app handles scroll
                }
            }, [selectedTerm]);

            // Handle Keyboard Shortcuts
            useEffect(() => {
                const handleKeyDown = (e) => {
                    // Escape: if modal open close it; else reset all filters
                    if (e.key === 'Escape') {
                        if (selectedTerm) {
                            setSelectedTerm(null);
                        } else {
                            // Reset everything back to "all terms"
                            setSelectedCategory('All');
                            setSelectedAlphabet(null);
                            setActiveSearch('');
                            setSearchInput('');
                            setActiveTab('dictionary');
                            setShowSuggestions(false);
                        }
                    }
                    // '/' or 'Ctrl+K' / 'Cmd+K' focuses search
                    if (e.key === '/' || ((e.metaKey || e.ctrlKey) && e.key === 'k')) {
                        // Prevent default if it's outside input to avoid typing '/' in input right away
                        if (document.activeElement.id !== 'search-input') {
                            e.preventDefault();
                            document.getElementById('search-input')?.focus();
                        }
                    }
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [selectedTerm]);



            return (
                <div className="h-screen w-full flex flex-col bg-slate-50 dark:bg-slate-900 transition-colors duration-300">

                    {/* Header */}
                    <nav className="flex-none px-6 py-3 bg-white dark:bg-slate-800 border-b border-slate-200 dark:border-slate-700 shadow-sm z-20">
                        <div className="flex items-center gap-4">
                            {/* Logo */}
                            <div className="flex items-center gap-2 flex-none">
                                <div className="w-8 h-8 rounded-lg bg-brand-500 flex items-center justify-center text-white font-bold text-xl">M</div>
                                <h1 className="text-xl font-serif font-bold tracking-tight hidden sm:block logo-shimmer">MatDex</h1>
                            </div>

                            {/* Centered Search */}
                            <div className="flex-1 flex justify-center">
                                <div ref={searchRef} className="relative w-full max-w-xl">
                                    <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
                                        <SearchIcon />
                                    </div>
                                    <input
                                        id="search-input"
                                        type="text"
                                        placeholder="Search terms… try 'Martensyte'"
                                        value={searchInput}
                                        onChange={(e) => { setSearchInput(e.target.value); setShowSuggestions(true); }}
                                        onKeyDown={(e) => {
                                            if (e.key === 'Enter') { setActiveSearch(searchInput); setShowSuggestions(false); }
                                            if (e.key === 'Escape') { setShowSuggestions(false); setSearchInput(''); setActiveSearch(''); }
                                        }}
                                        onFocus={() => searchInput.length >= 2 && setShowSuggestions(true)}
                                        className="block w-full pl-10 pr-16 py-2.5 border border-slate-300 dark:border-slate-600 rounded-full bg-white dark:bg-slate-700 text-slate-900 dark:text-slate-100 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-brand-500 transition-all duration-200 text-sm"
                                    />
                                    {searchInput && (
                                        <button onClick={() => { setSearchInput(''); setActiveSearch(''); setShowSuggestions(false); }}
                                            className="absolute inset-y-0 right-10 flex items-center pr-2 text-slate-400 hover:text-slate-600">
                                            <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" /></svg>
                                        </button>
                                    )}
                                    <div className="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none">
                                        <span className="hidden sm:inline text-[10px] font-bold text-slate-400 border border-slate-200 dark:border-slate-600 rounded px-1.5 py-0.5 bg-slate-50 dark:bg-slate-800">/</span>
                                    </div>

                                    {/* Autocomplete Dropdown */}
                                    {showSuggestions && suggestions.length > 0 && (
                                        <div className="absolute top-full mt-2 left-0 right-0 bg-white dark:bg-slate-800 rounded-2xl shadow-2xl border border-slate-200 dark:border-slate-700 overflow-hidden z-50">
                                            {suggestions.map((item, idx) => (
                                                <button key={idx}
                                                    onClick={() => { setSelectedTerm(item); setSearchInput(item.term); setActiveSearch(item.term); setShowSuggestions(false); }}
                                                    className="w-full flex items-start gap-4 px-6 py-5 hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors text-left border-b border-slate-100 dark:border-slate-700/50 last:border-0"
                                                >
                                                    <div className="flex-1 min-w-0">
                                                        <p className="font-bold text-slate-800 dark:text-slate-100 text-lg capitalize">{item.term}</p>
                                                        <p className="text-sm text-slate-500 dark:text-slate-400 mt-1 line-clamp-2 leading-relaxed">{item.definition}</p>
                                                    </div>
                                                    <div className="flex gap-2 mt-1">
                                                        <span className="text-[11px] font-bold uppercase tracking-wider px-3 py-1 bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-400 rounded-lg flex-none shadow-sm">{item.category}</span>
                                                    </div>
                                                </button>
                                            ))}
                                            {/* Ask AI — always last */}
                                            <button
                                                onClick={() => {
                                                    const query = searchInput.trim();
                                                    setShowSuggestions(false);
                                                    setIsChatOpen(true);
                                                    setTimeout(() => handleSendChatMessage(`Define "${query}" in the context of material science.`), 150);
                                                }}
                                                className="w-full flex items-center gap-4 px-6 py-4 bg-gradient-to-r from-brand-50 to-indigo-50 dark:from-brand-900/20 dark:to-indigo-900/20 hover:from-brand-100 hover:to-indigo-100 dark:hover:from-brand-900/40 dark:hover:to-indigo-900/40 transition-colors text-left border-t-2 border-brand-100 dark:border-brand-900/40"
                                            >
                                                <div className="w-8 h-8 rounded-full bg-gradient-to-br from-brand-500 to-indigo-500 flex items-center justify-center flex-none shadow-sm">
                                                    <svg className="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" /></svg>
                                                </div>
                                                <div className="flex-1 min-w-0">
                                                    <p className="font-bold text-brand-700 dark:text-brand-300 text-sm">Ask AI about "<span className="italic">{searchInput.trim()}</span>"</p>
                                                    <p className="text-xs text-slate-500 dark:text-slate-400 mt-0.5">Get a detailed AI explanation →</p>
                                                </div>
                                            </button>
                                        </div>
                                    )}
                                </div>
                            </div>

                            {/* Right buttons */}
                            <div className="flex items-center gap-2 flex-none">
                                <button onClick={() => setIsChatOpen(true)}
                                    className="hidden md:flex items-center gap-2 px-4 py-2 bg-gradient-to-r from-brand-500 to-indigo-500 hover:from-brand-600 hover:to-indigo-600 text-white rounded-full font-medium shadow-md hover:shadow-lg transition-all transform hover:-translate-y-0.5 text-sm"
                                    title="Open AI Assistant"
                                >
                                    <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" /></svg>
                                    AI Assistant
                                </button>
                                <button onClick={() => setIsFocusOpen(true)}
                                    className="hidden md:flex items-center gap-2 px-4 py-2 bg-brand-500 hover:bg-brand-600 text-white rounded-full font-medium shadow-md hover:shadow-lg transition-all transform hover:-translate-y-0.5 text-sm"
                                    title="Focus Mode"
                                >
                                    <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                                    Focus Mode
                                </button>
                                <button onClick={() => setIsSettingsOpen(true)}
                                    className="p-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors text-slate-500 dark:text-slate-400"
                                    title="Settings"
                                >
                                    <SettingsIcon />
                                </button>
                            </div>
                        </div>

                        {/* Tabs + Categories — single scrollable row on all sizes */}
                        <div className="flex items-center gap-2 mt-3 overflow-x-auto hide-scrollbar pb-1">
                            {/* Dictionary + Bookmarks as pills inside the row */}
                            <button onClick={() => setActiveTab('dictionary')}

                                    <div className="flex items-center justify-between px-6 py-4 border-b border-slate-100 dark:border-slate-700">
                                        <div className="flex items-center gap-2 text-brand-600 dark:text-brand-400">
                                            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                                            <h2 className="text-lg font-bold text-slate-800 dark:text-white">Focus Mode</h2>
                                        </div>
                                        <button onClick={() => { setIsFocusOpen(false); }} className="p-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-700 text-slate-500 transition-colors"><CloseIcon /></button>
                                    </div>

                                    <div className="p-6 space-y-6 overflow-y-auto custom-scrollbar">
                                        {/* Quote */}
                                        <div className="bg-brand-50 dark:bg-brand-900/20 rounded-2xl p-4 border border-brand-100 dark:border-brand-800/50 text-center">
                                            <p className="text-sm italic text-slate-700 dark:text-slate-300 leading-relaxed">"{FOCUS_QUOTES[focusQuote].q}"</p>
                                            <p className="text-xs font-semibold text-brand-600 dark:text-brand-400 mt-2">— {FOCUS_QUOTES[focusQuote].a}</p>
                                        </div>

                                        {/* Timer display */}
                                        <div className="flex flex-col items-center gap-3">
                                            <div className={`w-40 h-40 rounded-full border-4 ${focusRunning ? 'border-brand-400 focus-pulse' : focusSecondsLeft === 0 ? 'border-brand-300' : 'border-slate-200 dark:border-slate-600'} flex items-center justify-center transition-all duration-500`}>
                                                <span className="text-4xl font-bold font-mono text-slate-800 dark:text-white tabular-nums">
                                                    {focusMM}:{focusSS}
                                                </span>
                                            </div>
                                            {focusSecondsLeft === 0 && (
                                                <p className="text-sm font-semibold text-brand-600 dark:text-brand-400 animate-pulse">🎉 Time's up! Great session!</p>
                                            )}
                                        </div>

                                        {/* Minutes selector */}
                                        <div>
                                            <p className="text-xs font-semibold uppercase tracking-wider text-slate-400 dark:text-slate-500 mb-2 text-center">Set Duration (minutes)</p>
                                            <div className="flex gap-2 justify-center flex-wrap">
                                                {[5, 10, 15, 25, 30, 45, 60].map(m => (
                                                    <button key={m} onClick={() => { setFocusMinutes(m); setFocusSecondsLeft(m * 60); setFocusRunning(false); if (focusIntervalRef.current) { clearInterval(focusIntervalRef.current); focusIntervalRef.current = null; } }}
                                                        className={`px-3 py-1.5 rounded-full text-sm font-semibold border-2 transition-all ${focusMinutes === m && !focusRunning ? 'border-brand-500 bg-brand-50 dark:bg-brand-900/20 text-brand-700 dark:text-brand-300' : 'border-slate-200 dark:border-slate-600 text-slate-600 dark:text-slate-400 hover:border-brand-300'}`}
                                                    >{m}</button>
                                                ))}
                                            </div>
                                        </div>

                                        {/* Controls */}
                                        <div className="flex gap-2 justify-center flex-wrap">
                                            {!focusRunning ? (
                                                <button onClick={focusStart} disabled={focusSecondsLeft === 0}
                                                    className="flex items-center gap-2 px-5 py-2.5 bg-brand-500 hover:bg-brand-600 disabled:opacity-40 text-white rounded-full font-semibold shadow-md transition-all">
                                                    <svg className="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z" /></svg> Start
                                                </button>
                                            ) : (
                                                <button onClick={focusPause}
                                                    className="flex items-center gap-2 px-5 py-2.5 bg-amber-500 hover:bg-amber-600 text-white rounded-full font-semibold shadow-md transition-all">
                                                    <svg className="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" /></svg> Pause
                                                </button>
                                            )}
                                            <button onClick={() => { focusStop(); setIsFocusOpen(false); }}
                                                className="flex items-center gap-2 px-5 py-2.5 bg-red-500 hover:bg-red-600 text-white rounded-full font-semibold shadow-md transition-all">
                                                <svg className="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M6 6h12v12H6z" /></svg> End Focus
                                            </button>
                                            <button onClick={focusAddFive}
                                                className="flex items-center gap-2 px-5 py-2.5 bg-slate-100 dark:bg-slate-700 hover:bg-slate-200 dark:hover:bg-slate-600 text-slate-700 dark:text-slate-300 rounded-full font-semibold transition-all border border-slate-200 dark:border-slate-600">
                                                +5 min
                                            </button>
                                        </div>

                                        {focusActive && (
                                            <div className="flex justify-center">
                                                <button
                                                    onClick={focusBreak}
                                                    className="flex items-center gap-2 px-5 py-2 text-sm bg-amber-50 dark:bg-amber-900/20 hover:bg-amber-100 dark:hover:bg-amber-900/40 text-amber-700 dark:text-amber-300 border border-amber-300 dark:border-amber-700 rounded-full font-semibold transition-colors"
                                                >
                                                    <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10 9v6m4-6v6m7-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                                                    Take Break (1 min) — timer resumes automatically
                                                </button>
                                            </div>
                                        )}
                                    </div>
                                </motion.div>
                            </>
                        )}
                    </AnimatePresence>

                    {/* Floating Focus Widget — visible when focus session is active and modal is closed */}
                    {focusActive && !isFocusOpen && (
                        <motion.div
                            initial={{ opacity: 0, y: 16, scale: 0.9 }}
                            animate={{ opacity: 1, y: 0, scale: 1 }}
                            className="fixed bottom-5 right-5 z-40 flex items-center gap-3 px-4 py-2.5 bg-white dark:bg-slate-800 border border-brand-300 dark:border-brand-700 rounded-2xl shadow-xl"
                        >
                            <div className={`w-2.5 h-2.5 rounded-full flex-none ${focusRunning ? 'bg-green-400 animate-pulse' : 'bg-amber-400'}`} />
                            <button onClick={() => setIsFocusOpen(true)} className="font-mono font-bold text-lg text-slate-800 dark:text-white tabular-nums hover:text-brand-600 dark:hover:text-brand-400 transition-colors" title="Open Focus Mode">
                                {focusMM}:{focusSS}
                            </button>
                            <div className="flex gap-1.5">
                                <button
                                    onClick={focusBreak}
                                    title="Take a 1-minute break"
                                    className="flex items-center gap-1 px-2.5 py-1 text-xs font-semibold bg-amber-100 dark:bg-amber-900/30 text-amber-700 dark:text-amber-300 hover:bg-amber-200 dark:hover:bg-amber-900/60 border border-amber-300 dark:border-amber-700 rounded-full transition-colors"
                                >
                                    <svg className="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10 9v6m4-6v6m7-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                                    Break 1 min
                                </button>
                                <button
                                    onClick={focusStop}
                                    title="End Focus Mode"
                                    className="flex items-center gap-1 px-2.5 py-1 text-xs font-semibold bg-red-100 dark:bg-red-900/30 text-red-700 dark:text-red-300 hover:bg-red-200 dark:hover:bg-red-900/60 border border-red-300 dark:border-red-700 rounded-full transition-colors"
                                >
                                    <svg className="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" /></svg>
                                    End Focus
                                </button>
                            </div>
                        </motion.div>
                    )}

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
